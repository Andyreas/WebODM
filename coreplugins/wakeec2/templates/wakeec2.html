{% extends "app/plugins/templates/base.html" %}
{% block content %}
{% csrf_token %}
<style>
.wec2-section {
    max-width: 520px;
    margin: 32px auto;
}
.wec2-section h4 {
    border-bottom: 1px solid #dee2e6;
    padding-bottom: 8px;
    margin-bottom: 16px;
}

/* EC2 panel */
.state-badge {
    display: inline-block;
    padding: 6px 20px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 1.1em;
    text-transform: capitalize;
    margin: 10px 0 16px;
}
.state-ready    { background: #d4edda; color: #155724; }
.state-stopped  { background: #f8d7da; color: #721c24; }
.state-starting,
.state-pending  { background: #fff3cd; color: #856404; }
.state-stopping { background: #fde8d8; color: #7a3c00; }
.state-unknown  { background: #e2e3e5; color: #383d41; }

/* Storage panel */
.storage-bar-wrap {
    background: #e9ecef;
    border-radius: 6px;
    height: 18px;
    margin: 10px 0 4px;
    overflow: hidden;
}
.storage-bar {
    height: 100%;
    background: #0d6efd;
    border-radius: 6px;
    transition: width 0.4s;
}
.storage-bar.warn  { background: #fd7e14; }
.storage-bar.crit  { background: #dc3545; }
.storage-meta {
    font-size: 0.85em;
    color: #666;
    margin-bottom: 14px;
}
.orphan-list {
    font-size: 0.9em;
    margin: 10px 0;
    max-height: 180px;
    overflow-y: auto;
    border: 1px solid #dee2e6;
    border-radius: 4px;
    padding: 8px 10px;
    background: #f8f9fa;
}
.orphan-list li {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    border-bottom: 1px solid #eee;
}
.orphan-list li:last-child { border-bottom: none; }
#storage-msg { min-height: 18px; font-size: 0.9em; margin-top: 10px; color: #555; }
</style>

<!-- ── EC2 section ──────────────────────────────────────── -->
<div class="wec2-section" style="text-align:center;">
    <h4><i class="fa fa-server"></i>&nbsp; EC2 Processing Node</h4>
    <span id="state-badge" class="state-badge state-unknown">Checking…</span>
    <br>
    <button id="start-btn" class="btn btn-success btn-lg" onclick="startEC2()" disabled>
        <i class="fa fa-play"></i>&nbsp; Start EC2
    </button>
    <p id="ec2-msg" style="min-height:18px; margin-top:10px; color:#555; font-size:0.9em;"></p>
</div>

<!-- ── Storage section ────────────────────────────────────── -->
<div class="wec2-section">
    <h4><i class="fa fa-hdd"></i>&nbsp; Railway Volume Storage</h4>
    <div class="storage-bar-wrap">
        <div id="storage-bar" class="storage-bar" style="width:0%"></div>
    </div>
    <div id="storage-meta" class="storage-meta">Loading…</div>

    <div id="orphan-section" style="display:none;">
        <b id="orphan-title"></b>
        <ul id="orphan-list" class="orphan-list"></ul>
        <button class="btn btn-warning btn-sm" onclick="runCleanup()">
            <i class="fa fa-trash"></i>&nbsp; Delete orphaned files
        </button>
    </div>
    <div id="no-orphans" style="display:none; color:#155724;">
        <i class="fa fa-check-circle"></i>&nbsp; No orphaned files found — storage is clean.
    </div>
    <p id="storage-msg"></p>
    <button class="btn btn-outline-secondary btn-sm" style="margin-top:6px;" onclick="loadStorage()">
        <i class="fa fa-sync"></i>&nbsp; Refresh
    </button>
</div>

<script>
(function () {
    var csrf = document.querySelector('[name=csrfmiddlewaretoken]').value;

    /* ── helpers ── */
    function fmt(bytes) {
        if (bytes >= 1e9) return (bytes / 1e9).toFixed(1) + ' GB';
        if (bytes >= 1e6) return (bytes / 1e6).toFixed(1) + ' MB';
        return (bytes / 1e3).toFixed(0) + ' KB';
    }

    /* ── EC2 + NodeODX ── */
    function setStatus(d, msg) {
        var badge = document.getElementById('state-badge');
        var ec2 = d.ec2 || 'unknown';
        var nodeodx = d.nodeodx;
        var label, cls;

        if (nodeodx === true) {
            label = 'NodeODX Ready ✓';
            cls   = 'state-ready';
        } else if (ec2 === 'running') {
            label = 'EC2 running — NodeODX starting up…';
            cls   = 'state-starting';
        } else if (ec2 === 'stopped') {
            label = 'Stopped';
            cls   = 'state-stopped';
        } else if (ec2 === 'starting' || ec2 === 'pending') {
            label = 'EC2 Starting…';
            cls   = 'state-starting';
        } else if (ec2 === 'stopping') {
            label = 'Stopping…';
            cls   = 'state-stopping';
        } else {
            label = ec2;
            cls   = 'state-unknown';
        }

        badge.textContent = label;
        badge.className   = 'state-badge ' + cls;
        document.getElementById('start-btn').disabled = (ec2 !== 'stopped');
        if (msg !== undefined) document.getElementById('ec2-msg').textContent = msg;
    }

    function checkEC2() {
        fetch('status', { credentials: 'same-origin' })
            .then(function (r) { return r.json(); })
            .then(function (d) { setStatus(d, ''); })
            .catch(function () { setStatus({ec2: 'unknown'}, 'Could not reach server'); });
    }

    window.startEC2 = function () {
        setStatus({ec2: 'starting', nodeodx: false}, 'Sending start command…');
        fetch('start', {
            method: 'POST', credentials: 'same-origin',
            headers: { 'X-CSRFToken': csrf },
        })
        .then(function (r) { return r.json(); })
        .then(function (d) { setStatus(d, d.message || d.error || ''); })
        .catch(function () { setStatus({ec2: 'unknown'}, 'Request failed'); });
    };

    /* ── Storage ── */
    window.loadStorage = function () {
        document.getElementById('storage-meta').textContent = 'Scanning… (may take a moment)';
        document.getElementById('orphan-section').style.display = 'none';
        document.getElementById('no-orphans').style.display = 'none';
        document.getElementById('storage-msg').textContent = '';

        fetch('storage', { credentials: 'same-origin' })
            .then(function (r) { return r.json(); })
            .then(function (d) {
                if (d.error) {
                    document.getElementById('storage-meta').textContent = 'Error: ' + d.error;
                    return;
                }
                var pct = Math.round(d.used / d.total * 100);
                var bar = document.getElementById('storage-bar');
                bar.style.width = pct + '%';
                bar.className = 'storage-bar' + (pct >= 90 ? ' crit' : pct >= 75 ? ' warn' : '');
                document.getElementById('storage-meta').textContent =
                    fmt(d.used) + ' used of ' + fmt(d.total) + ' (' + pct + '%)' +
                    (d.orphaned_size > 0 ? ' — ' + fmt(d.orphaned_size) + ' in orphaned files' : '');

                if (d.orphaned && d.orphaned.length > 0) {
                    var list = document.getElementById('orphan-list');
                    list.innerHTML = '';
                    d.orphaned.forEach(function (o) {
                        var li = document.createElement('li');
                        li.innerHTML = '<span style="font-family:monospace; font-size:0.85em;">' +
                            o.task_id.substring(0, 8) + '…</span><span>' + fmt(o.size) + '</span>';
                        list.appendChild(li);
                    });
                    document.getElementById('orphan-title').textContent =
                        d.orphaned.length + ' orphaned task director' +
                        (d.orphaned.length === 1 ? 'y' : 'ies') + ' (' + fmt(d.orphaned_size) + ')';
                    document.getElementById('orphan-section').style.display = 'block';
                } else {
                    document.getElementById('no-orphans').style.display = 'block';
                }
            })
            .catch(function () {
                document.getElementById('storage-meta').textContent = 'Failed to load storage info';
            });
    };

    window.runCleanup = function () {
        if (!confirm('Delete all orphaned task directories? This cannot be undone.')) return;
        document.getElementById('storage-msg').textContent = 'Cleaning up…';
        document.getElementById('orphan-section').style.display = 'none';

        fetch('cleanup', {
            method: 'POST', credentials: 'same-origin',
            headers: { 'X-CSRFToken': csrf },
        })
        .then(function (r) { return r.json(); })
        .then(function (d) {
            if (d.error) {
                document.getElementById('storage-msg').textContent = 'Error: ' + d.error;
                return;
            }
            document.getElementById('storage-msg').textContent =
                'Done — deleted ' + d.deleted + ' director' + (d.deleted === 1 ? 'y' : 'ies') +
                ', freed ' + fmt(d.freed) +
                (d.errors.length > 0 ? ' (' + d.errors.length + ' errors)' : '') + '.';
            loadStorage();
        })
        .catch(function () {
            document.getElementById('storage-msg').textContent = 'Cleanup request failed';
        });
    };

    /* ── init ── */
    checkEC2();
    setInterval(checkEC2, 10000);
    loadStorage();
}());
</script>
{% endblock %}
