{% extends "app/plugins/templates/base.html" %}
{% block content %}
{% csrf_token %}
<style>
.ec2-panel {
    max-width: 460px;
    margin: 48px auto;
    text-align: center;
    font-family: inherit;
}
.ec2-panel h3 {
    margin-bottom: 8px;
}
.ec2-panel .instance-id {
    color: #888;
    font-size: 0.9em;
    margin-bottom: 20px;
}
.state-badge {
    display: inline-block;
    padding: 8px 24px;
    border-radius: 24px;
    font-weight: bold;
    font-size: 1.15em;
    letter-spacing: 0.5px;
    margin: 12px 0 20px;
    text-transform: capitalize;
}
.state-running  { background: #d4edda; color: #155724; }
.state-stopped  { background: #f8d7da; color: #721c24; }
.state-starting,
.state-pending  { background: #fff3cd; color: #856404; }
.state-stopping { background: #fde8d8; color: #7a3c00; }
.state-unknown  { background: #e2e3e5; color: #383d41; }

#message {
    margin-top: 14px;
    color: #555;
    min-height: 20px;
    font-size: 0.95em;
}
.poll-note {
    margin-top: 28px;
    font-size: 0.82em;
    color: #aaa;
}
</style>

<div class="ec2-panel">
    <h3><i class="fa fa-server"></i>&nbsp; EC2 Processing Node</h3>
    <div class="instance-id">NodeODX on EC2</div>

    <div>
        <span id="state-badge" class="state-badge state-unknown">Checking…</span>
    </div>

    <button id="start-btn" class="btn btn-success btn-lg" onclick="startEC2()" disabled>
        <i class="fa fa-play"></i>&nbsp; Start EC2
    </button>

    <p id="message"></p>
    <p class="poll-note">Status refreshes every 10 seconds.</p>
</div>

<script>
(function () {
    var csrf = document.querySelector('[name=csrfmiddlewaretoken]').value;

    var STATE_LABELS = {
        running:  'Running ✓',
        stopped:  'Stopped',
        starting: 'Starting…',
        pending:  'Starting…',
        stopping: 'Stopping…',
    };

    function setState(state, msg) {
        var badge = document.getElementById('state-badge');
        badge.textContent = STATE_LABELS[state] || state;
        badge.className = 'state-badge state-' + (STATE_LABELS[state] ? state : 'unknown');

        var btn = document.getElementById('start-btn');
        btn.disabled = (state !== 'stopped');

        if (msg !== undefined) {
            document.getElementById('message').textContent = msg;
        }
    }

    function checkStatus() {
        fetch('status', { credentials: 'same-origin' })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (data.state) setState(data.state, '');
                else setState('unknown', data.error || 'Unknown error');
            })
            .catch(function () { setState('unknown', 'Could not reach server'); });
    }

    window.startEC2 = function () {
        setState('starting', 'Sending start command…');
        fetch('start', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'X-CSRFToken': csrf },
        })
        .then(function (r) { return r.json(); })
        .then(function (data) {
            if (data.state) setState(data.state, data.message || '');
            else setState('unknown', data.error || 'Error');
        })
        .catch(function () { setState('unknown', 'Request failed'); });
    };

    checkStatus();
    setInterval(checkStatus, 10000);
}());
</script>
{% endblock %}
